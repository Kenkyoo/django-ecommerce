<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}ShopDjango{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Tokens ── */
      :root {
        --clr-bg: #fafaf8;
        --clr-surface: #ffffff;
        --clr-border: #e7e5e4;
        --clr-text: #1c1917;
        --clr-muted: #78716c;
        --clr-accent: #3730a3;
        --clr-accent-lt: #eef2ff;
        --clr-danger: #dc2626;
        --radius: 10px;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.07);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.09);
      }

      /* ── Base ── */
      body {
        background: var(--clr-bg);
        color: var(--clr-text);
        font-family: "Inter", sans-serif;
        font-size: 0.9375rem;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Navbar ── */
      .navbar-main {
        background: var(--clr-surface);
        border-bottom: 1px solid var(--clr-border);
        padding: 0.85rem 0;
      }

      .navbar-brand-text {
        font-family: "Playfair Display", serif;
        font-size: 1.45rem;
        font-weight: 700;
        color: var(--clr-accent) !important;
        letter-spacing: -0.5px;
        text-decoration: none;
      }

      .nav-link-custom {
        color: var(--clr-text) !important;
        font-weight: 500;
        font-size: 0.875rem;
        padding: 0.35rem 0.7rem !important;
        border-radius: 6px;
        transition:
          background 0.15s,
          color 0.15s;
        text-decoration: none;
      }
      .nav-link-custom:hover {
        background: var(--clr-accent-lt);
        color: var(--clr-accent) !important;
      }
      .nav-link-custom.active {
        color: var(--clr-accent) !important;
      }

      .cart-badge {
        background: var(--clr-accent);
        color: #fff;
        font-size: 0.65rem;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 20px;
        vertical-align: super;
      }

      .btn-nav-accent {
        background: var(--clr-accent);
        color: #fff !important;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.4rem 1rem;
        border-radius: 6px;
        border: none;
        text-decoration: none;
        transition: opacity 0.15s;
      }
      .btn-nav-accent:hover {
        opacity: 0.85;
        color: #fff !important;
      }

      /* ── Cards ── */
      .card-custom {
        background: var(--clr-surface);
        border: 1px solid var(--clr-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
      }

      /* ── Buttons ── */
      .btn-accent {
        background: var(--clr-accent);
        color: #fff;
        border: none;
        border-radius: 7px;
        font-weight: 600;
        font-size: 0.875rem;
        padding: 0.55rem 1.25rem;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      .btn-accent:hover {
        opacity: 0.87;
        color: #fff;
        transform: translateY(-1px);
      }

      .btn-outline-custom {
        border: 1.5px solid var(--clr-accent);
        color: var(--clr-accent);
        border-radius: 7px;
        font-weight: 600;
        font-size: 0.875rem;
        padding: 0.5rem 1.2rem;
        background: transparent;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .btn-outline-custom:hover {
        background: var(--clr-accent-lt);
        color: var(--clr-accent);
      }

      /* ── Form inputs ── */
      .form-control-custom {
        border: 1.5px solid var(--clr-border);
        border-radius: 7px;
        padding: 0.6rem 0.9rem;
        font-size: 0.9rem;
        background: var(--clr-surface);
        color: var(--clr-text);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .form-control-custom:focus {
        border-color: var(--clr-accent);
        box-shadow: 0 0 0 3px rgba(55, 48, 163, 0.12);
        outline: none;
      }
      .form-label-custom {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--clr-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.3rem;
      }

      /* ── Alert ── */
      .alert-custom {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: var(--clr-danger);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
      }

      /* ── Section headings ── */
      .section-title {
        font-family: "Playfair Display", serif;
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--clr-text);
      }
      .section-eyebrow {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--clr-accent);
        margin-bottom: 0.25rem;
      }

      /* ── Footer ── */
      .footer-main {
        margin-top: auto;
        border-top: 1px solid var(--clr-border);
        background: var(--clr-surface);
        padding: 1.5rem 0;
        font-size: 0.8rem;
        color: var(--clr-muted);
      }

      /* ── Misc ── */
      .divider {
        height: 1px;
        background: var(--clr-border);
        margin: 1.5rem 0;
      }
      .text-accent {
        color: var(--clr-accent) !important;
      }
      .bg-accent-lt {
        background: var(--clr-accent-lt) !important;
      }
    </style>

    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <!-- ── Navbar ── -->
    <nav class="navbar navbar-main navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand-text" href="{% url 'store' %}"
          >Shop<span style="color: var(--clr-text)">Django</span></a
        >

        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMain"
        >
          <i class="bi bi-list fs-4"></i>
        </button>

        <div class="collapse navbar-collapse" id="navMain">
          <ul class="navbar-nav me-auto ms-3 gap-1">
            <li class="nav-item">
              <a
                class="nav-link-custom {% block nav_store %}{% endblock %}"
                href="{% url 'store' %}"
              >
                <i class="bi bi-grid me-1"></i>Tienda
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link-custom {% block nav_orders %}{% endblock %}"
                href="{% url 'orders' %}"
              >
                <i class="bi bi-receipt me-1"></i>Mis pedidos
              </a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-2">
            <a
              href="{% url 'cart' %}"
              class="nav-link-custom position-relative"
            >
              <i class="bi bi-bag fs-5"></i>
              <span class="cart-badge">0</span>
            </a>

            {% if request.session.customer %}
            <a href="{% url 'logout' %}" class="btn-nav-accent">
              <i class="bi bi-box-arrow-right me-1"></i>Salir
            </a>
            {% else %}
            <a href="{% url 'login' %}" class="nav-link-custom">Entrar</a>
            <a href="{% url 'signup' %}" class="btn-nav-accent">Registrarse</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <!-- ── Main content ── -->
    <main class="flex-grow-1">{% block content %}{% endblock %}</main>

    <!-- ── Footer ── -->
    <footer class="footer-main">
      <div
        class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2"
      >
        <span>
          <strong
            style="
              font-family: &quot;Playfair Display&quot;, serif;
              color: var(--clr-accent);
            "
            >ShopDjango</strong
          >
          &mdash; Proyecto de ejemplo
        </span>
        <span
          >Hecho con <i class="bi bi-heart-fill text-danger"></i> y Django</span
        >
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>

{% extends 'base.html' %}

{% block title %}Iniciar sesión — ShopDjango{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="auth-card">
    <div class="auth-header">
      <h3 class="fw-bold mb-1">ShopDjango</h3>
      <p class="mb-0 opacity-75">Bienvenido de vuelta</p>
    </div>

    <div class="card-body p-4">
      {% if error %}
      <div class="alert alert-danger d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold small text-uppercase text-secondary">
            Correo electrónico
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="tu@email.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small text-uppercase text-secondary">
            Contraseña
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
        </button>
      </form>

      <hr class="my-4" />

      <p class="text-center text-muted small mb-0">
        ¿No tienes cuenta?
        <a href="{% url 'signup' %}" class="text-primary fw-semibold">Crear cuenta gratis</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Crear cuenta — ShopDjango{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="auth-card" style="max-width: 500px;">
    <div class="auth-header">
      <h3 class="fw-bold mb-1">ShopDjango</h3>
      <p class="mb-0 opacity-75">Crea tu cuenta en segundos</p>
    </div>

    <div class="card-body p-4">
      {% if error %}
      <div class="alert alert-danger d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'signup' %}">
        {% csrf_token %}

        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label fw-semibold small text-uppercase text-secondary">
              Nombre
            </label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
              <input
                type="text"
                name="firstname"
                class="form-control"
                placeholder="Ana"
                value="{{ values.first_name|default:'' }}"
                required
                minlength="3"
              />
            </div>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold small text-uppercase text-secondary">
              Apellido
            </label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
              <input
                type="text"
                name="lastname"
                class="form-control"
                placeholder="García"
                value="{{ values.last_name|default:'' }}"
                required
                minlength="3"
              />
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small text-uppercase text-secondary">
            Teléfono
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
            <input
              type="tel"
              name="phone"
              class="form-control"
              placeholder="1122334455"
              value="{{ values.phone|default:'' }}"
              required
              minlength="10"
              maxlength="10"
              pattern="[0-9]{10}"
            />
          </div>
          <div class="form-text">10 dígitos, sin espacios ni guiones</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small text-uppercase text-secondary">
            Correo electrónico
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="tu@email.com"
              value="{{ values.email|default:'' }}"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small text-uppercase text-secondary">
            Contraseña
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Mínimo 5 caracteres"
              required
              minlength="5"
              autocomplete="new-password"
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-person-plus me-2"></i>Crear cuenta
        </button>
      </form>

      <hr class="my-4" />

      <p class="text-center text-muted small mb-0">
        ¿Ya tienes cuenta?
        <a href="{% url 'login' %}" class="text-primary fw-semibold">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

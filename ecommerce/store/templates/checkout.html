{% extends 'base.html' %}

{% block title %}Checkout — ShopDjango{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="mb-4">
      <p class="text-uppercase fw-bold text-primary small mb-0">Último paso</p>
      <h1 class="section-title">Confirmar pedido</h1>
    </div>

    <!-- Steps -->
    <div class="step-indicator d-flex align-items-center mb-4">
      <div class="step done">
        <span class="step-number"><i class="bi bi-check" style="font-size: 0.7rem;"></i></span>
        <span>Carrito</span>
      </div>
      <div class="step-line"></div>
      <div class="step active">
        <span class="step-number">2</span>
        <span>Entrega</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <span class="step-number">3</span>
        <span>Confirmado</span>
      </div>
    </div>

    <div class="row g-4">
      <!-- Form -->
      <div class="col-lg-7">
        <form method="POST" action="{% url 'checkout' %}">
          {% csrf_token %}

          <!-- Delivery -->
          <div class="card mb-3">
            <div class="card-header bg-light d-flex align-items-center gap-2">
              <i class="bi bi-geo-alt-fill text-primary"></i>
              <span class="fw-semibold">Datos de entrega</span>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase text-secondary">
                  Dirección de entrega
                </label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-house"></i></span>
                  <input
                    type="text"
                    name="address"
                    class="form-control"
                    placeholder="Av. Corrientes 1234, Buenos Aires"
                    required
                  />
                </div>
              </div>

              <div>
                <label class="form-label fw-semibold small text-uppercase text-secondary">
                  Teléfono de contacto
                </label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
                  <input
                    type="tel"
                    name="phone"
                    class="form-control"
                    placeholder="1122334455"
                    required
                    minlength="10"
                    maxlength="10"
                    pattern="[0-9]{10}"
                  />
                </div>
                <div class="form-text">Para coordinar la entrega</div>
              </div>
            </div>
          </div>

          <!-- Payment -->
          <div class="card">
            <div class="card-header bg-light d-flex align-items-center gap-2">
              <i class="bi bi-credit-card-fill text-primary"></i>
              <span class="fw-semibold">Método de pago</span>
            </div>
            <div class="card-body">
              <div class="d-flex gap-2 flex-wrap mb-3">
                <label class="payment-option active">
                  <input type="radio" name="payment" value="card" checked class="d-none" />
                  <i class="bi bi-credit-card me-1"></i> Tarjeta
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="transfer" class="d-none" />
                  <i class="bi bi-bank me-1"></i> Transferencia
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="cash" class="d-none" />
                  <i class="bi bi-cash me-1"></i> Efectivo
                </label>
              </div>

              <!-- Fake card fields -->
              <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase text-secondary">
                  Número de tarjeta
                </label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="•••• •••• •••• ••••"
                  maxlength="19"
                  disabled
                />
              </div>
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label fw-semibold small text-uppercase text-secondary">
                    Vencimiento
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="MM / AA"
                    disabled
                  />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold small text-uppercase text-secondary">
                    CVV
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="•••"
                    maxlength="3"
                    disabled
                  />
                </div>
              </div>

              <div class="alert alert-info mt-3 d-flex align-items-center" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i>
                Campos de pago deshabilitados — entorno de demostración.
              </div>
            </div>
          </div>

          <button type="submit" class
